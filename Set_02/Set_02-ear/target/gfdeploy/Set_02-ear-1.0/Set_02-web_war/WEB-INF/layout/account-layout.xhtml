<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">
    <h:head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title><ui:insert name="title">Account Portal</ui:insert></title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
              rel="stylesheet"/>
        <h:outputStylesheet library="css" name="account.css"/>
    </h:head>

    <h:body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <h:link outcome="account-list" value="Account Portal" styleClass="navbar-brand"/>
                <div class="navbar-nav ms-auto">
                    <h:link outcome="account-list" value="Accounts" styleClass="nav-link"/>
                    <h:link outcome="account-create" value="Create account" styleClass="nav-link"/>
                    <h:link outcome="login" value="Sign out" styleClass="nav-link"/>
                </div>
            </div>
        </nav>

        <main class="container py-4">
            <h:messages globalOnly="true"
                        styleClass="list-unstyled"
                        infoClass="alert alert-success"
                        warnClass="alert alert-warning"
                        errorClass="alert alert-danger"
                        fatalClass="alert alert-danger"/>
            <ui:insert name="content"/>
        </main>

        <footer class="border-top bg-white py-3 mt-4">
            <div class="container text-muted small">
                Account Management System
            </div>
        </footer>
    </h:body>
</html>
