<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE composition>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                template="./WEB-INF/layout/account-layout.xhtml">

    <ui:define name="title">Create account | Account Portal</ui:define>

    <ui:define name="content">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="mb-0">Create account</h3>
                    <h:link outcome="account-list" value="Back to list" styleClass="btn btn-outline-secondary btn-sm"/>
                </div>

                <div class="card">
                    <div class="card-body">
                        <h:form id="accountForm" enctype="multipart/form-data">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="username" value="Username" styleClass="form-label"/>
                                    <h:inputText id="username"
                                                 value="#{accountBean.account.username}"
                                                 styleClass="form-control"
                                                 maxlength="10"
                                                 required="true"
                                                 requiredMessage="Username is required."/>
                                    <h:message for="username" styleClass="text-danger small d-block mt-1"/>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="role" value="Role" styleClass="form-label"/>
                                    <h:selectOneRadio id="role"
                                                      value="#{accountBean.account.role}"
                                                      styleClass="d-flex gap-3"
                                                      required="true"
                                                      requiredMessage="Role is required.">
                                        <f:selectItem itemValue="user" itemLabel="user&#160;"/>
                                        <f:selectItem itemValue="admin" itemLabel="admin"/>
                                    </h:selectOneRadio>
                                    <h:message for="role" styleClass="text-danger small d-block mt-1"/>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="password" value="Password" styleClass="form-label"/>
                                    <h:inputSecret id="password"
                                                   value="#{accountBean.account.password}"
                                                   styleClass="form-control"
                                                   maxlength="20"
                                                   redisplay="true"
                                                   required="true"
                                                   requiredMessage="Password is required."/>
                                    <h:message for="password" styleClass="text-danger small d-block mt-1"/>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="confirmPassword" value="Confirm password" styleClass="form-label"/>
                                    <h:inputSecret id="confirmPassword"
                                                   value="#{accountBean.rePass}"
                                                   styleClass="form-control"
                                                   required="true"
                                                   requiredMessage="Please confirm the password."
                                                   validator="#{accountBean.validate}">
                                        <f:attribute name="checkPass" value="password"/>
                                    </h:inputSecret>
                                    <h:message for="confirmPassword" styleClass="text-danger small d-block mt-1"/>
                                </div>

                                <div class="col-12 mb-3">
                                    <h:outputLabel for="image" value="Image" styleClass="form-label"/>
                                    <h:inputFile id="image"
                                                 value="#{accountBean.part}"
                                                 styleClass="form-control"
                                                 required="true"
                                                 requiredMessage="Image is required."/>
                                    <h:message for="image" styleClass="text-danger small d-block mt-1"/>
                                </div>
                            </div>

                            <div class="text-end">
                                <h:link outcome="account-list" value="Cancel" styleClass="btn btn-secondary me-2"/>
                                <h:commandButton value="Save"
                                                 action="#{accountBean.insert}"
                                                 styleClass="btn btn-primary"/>
                            </div>
                        </h:form>
                    </div>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
