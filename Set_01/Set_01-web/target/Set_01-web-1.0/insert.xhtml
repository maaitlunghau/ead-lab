<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE composition>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                template="./WEB-INF/layout/employee-layout.xhtml">

    <ui:define name="title">Add employee | Employee Portal</ui:define>

    <ui:define name="content">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="mb-0">Add employee</h3>
                    <h:link outcome="view" value="Back to list" styleClass="btn btn-outline-secondary btn-sm"/>
                </div>

                <div class="card">
                    <div class="card-body">
                        <h:form id="employeeForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="empCode" value="Employee code" styleClass="form-label"/>
                                    <h:inputText id="empCode"
                                                 value="#{employeeManagedBean.employee.empCode}"
                                                 styleClass="form-control"
                                                 maxlength="10"
                                                 required="true"
                                                 requiredMessage="Employee code is required."/>
                                    <h:message for="empCode" styleClass="text-danger small d-block mt-1"/>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="name" value="Full name" styleClass="form-label"/>
                                    <h:inputText id="name"
                                                 value="#{employeeManagedBean.employee.name}"
                                                 styleClass="form-control"
                                                 maxlength="40"
                                                 required="true"
                                                 requiredMessage="Full name is required."/>
                                    <h:message for="name" styleClass="text-danger small d-block mt-1"/>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="password" value="Password" styleClass="form-label"/>
                                    <h:inputSecret id="password"
                                                   value="#{employeeManagedBean.employee.password}"
                                                   styleClass="form-control"
                                                   maxlength="20"
                                                   redisplay="true"
                                                   required="true"
                                                   requiredMessage="Password is required."/>
                                    <h:message for="password" styleClass="text-danger small d-block mt-1"/>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="confirmPassword" value="Confirm password" styleClass="form-label"/>
                                    <h:inputSecret id="confirmPassword"
                                                   styleClass="form-control"
                                                   required="true"
                                                   requiredMessage="Please confirm the password."
                                                   validator="#{employeeManagedBean.validate}">
                                        <f:attribute name="checkPass" value="password"/>
                                    </h:inputSecret>
                                    <h:message for="confirmPassword" styleClass="text-danger small d-block mt-1"/>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <h:outputLabel for="age" value="Age" styleClass="form-label"/>
                                    <h:inputText id="age"
                                                 value="#{employeeManagedBean.employee.age}"
                                                 styleClass="form-control"
                                                 required="true"
                                                 requiredMessage="Age is required."
                                                 converterMessage="Age must be a whole number."
                                                 validatorMessage="Employee must be at least 18 years old.">
                                        <f:validateLongRange minimum="18"/>
                                    </h:inputText>
                                    <h:message for="age" styleClass="text-danger small d-block mt-1"/>
                                </div>
                            </div>

                            <div class="text-end">
                                <h:link outcome="view" value="Cancel" styleClass="btn btn-secondary me-2"/>
                                <h:commandButton value="Save"
                                                 action="#{employeeManagedBean.insert}"
                                                 styleClass="btn btn-primary"/>
                            </div>
                        </h:form>
                    </div>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
