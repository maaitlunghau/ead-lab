<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE composition>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                template="./WEB-INF/layout/employee-layout.xhtml">

    <ui:define name="title">Login | Employee Portal</ui:define>

    <ui:define name="content">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Login</h5>
                    </div>
                    <div class="card-body">
                        <h:form id="loginForm">
                            <div class="mb-3">
                                <h:outputLabel for="username" value="Employee Code" styleClass="form-label"/>
                                <h:inputText id="username"
                                             value="#{employeeManagedBean.username}"
                                             styleClass="form-control"
                                             required="true"
                                             requiredMessage="Employee code is required."/>
                                <h:message for="username" styleClass="text-danger small"/>
                            </div>
                            <div class="mb-3">
                                <h:outputLabel for="password" value="Password" styleClass="form-label"/>
                                <h:inputSecret id="password"
                                               value="#{employeeManagedBean.password}"
                                               styleClass="form-control"
                                               required="true"
                                               requiredMessage="Password is required."/>
                                <h:message for="password" styleClass="text-danger small"/>
                            </div>
                            <h:commandButton value="Login"
                                             action="#{employeeManagedBean.login}"
                                             styleClass="btn btn-primary w-100"/>
                        </h:form>
                    </div>
                </div>
            </div>
        </div>
    </ui:define>

</ui:composition>
