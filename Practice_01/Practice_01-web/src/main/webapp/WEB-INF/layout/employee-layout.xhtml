<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title><ui:insert name="title">Employee Portal</ui:insert></title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <h:outputStylesheet library="css" name="employee.css"/>
</h:head>

<h:body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold">Employee Portal</span>
        </div>
    </nav>

    <div class="container">
        <h:messages globalOnly="true" showDetail="false"
                    infoClass="alert alert-success d-block"
                    errorClass="alert alert-danger d-block"/>

        <ui:insert name="content"/>
    </div>
</h:body>
</html>
