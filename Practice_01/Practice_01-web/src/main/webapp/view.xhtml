<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE composition>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                template="./WEB-INF/layout/employee-layout.xhtml">

    <ui:define name="title">Employees | Employee Portal</ui:define>

    <ui:define name="content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">Employee List</h4>
            <h:link outcome="insert" value="Add Employee" styleClass="btn btn-primary btn-sm"/>
        </div>

        <div class="card">
            <div class="card-header">
                Total: #{employeeManagedBean.view().size()} records
            </div>
            <div class="card-body p-0">
                <h:panelGroup rendered="#{not empty employeeManagedBean.view()}">
                    <h:dataTable value="#{employeeManagedBean.view()}"
                                 var="item"
                                 styleClass="table table-striped table-hover mb-0">
                        <h:column>
                            <f:facet name="header">Employee Code</f:facet>
                            #{item.empCode}
                        </h:column>
                        <h:column>
                            <f:facet name="header">Full Name</f:facet>
                            #{item.name}
                        </h:column>
                        <h:column>
                            <f:facet name="header">Age</f:facet>
                            #{item.age}
                        </h:column>
                    </h:dataTable>
                </h:panelGroup>

                <h:panelGroup rendered="#{empty employeeManagedBean.view()}">
                    <div class="p-4 text-center text-muted">No employees found.</div>
                </h:panelGroup>
            </div>
        </div>
    </ui:define>

</ui:composition>
